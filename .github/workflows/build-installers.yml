name: Build installers

# Builds standalone agent installers for Linux, Windows, and macOS using
# the existing build-* scripts under agent/install/build/.
#
# Triggers:
#   - Manual:   GitHub Actions UI → "Run workflow", or `gh workflow run build-installers.yml`
#   - Tag push: `git tag v1.2.3 && git push --tags` builds + cuts a release
#
# Outputs land as workflow artifacts. When `VPS_HOST` + `VPS_SSH_KEY`
# secrets are set, a deploy job pushes the binaries to the VPS so the
# backend's `/install/{token}/download/{platform}` route serves the real
# .exe / .pkg / Linux binary instead of the .ps1 / .sh fallback.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed for GitHub Releases when triggered by a tag

jobs:
  # ──────────────────────────── Linux ────────────────────────────
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        run: |
          chmod +x agent/install/build/build-linux.sh
          ./agent/install/build/build-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: agent-linux
          path: agent/install/build/dist/linux/
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────── Windows ───────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Materialise signing cert (if provided)
        if: env.WINDOWS_CODESIGN_CERT_BASE64 != ''
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
        shell: pwsh
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64)
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($certPath, $bytes)
          "WINDOWS_CODESIGN_CERT=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build
        env:
          WINDOWS_CODESIGN_PASS: ${{ secrets.WINDOWS_CODESIGN_PASS }}
        shell: pwsh
        run: ./agent/install/build/build-windows.ps1

      - uses: actions/upload-artifact@v4
        with:
          name: agent-windows
          path: agent/install/build/dist/windows/
          if-no-files-found: error
          retention-days: 30

  # ──────────────────────────── macOS ────────────────────────────
  build-macos:
    name: Build macOS .pkg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_NOTARIZE_PASSWORD: ${{ secrets.APPLE_NOTARIZE_PASSWORD }}
        run: |
          chmod +x agent/install/build/build-macos.sh agent/install/build/sign-macos.sh
          ./agent/install/build/build-macos.sh

      - uses: actions/upload-artifact@v4
        with:
          name: agent-macos
          path: agent/install/build/dist/macos/
          if-no-files-found: error
          retention-days: 30

  # ───────────────────────── Optional deploy ─────────────────────────
  deploy:
    name: Deploy to VPS
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    # Only attempt SCP when the host secret is configured. Skipped silently otherwise.
    if: ${{ vars.VPS_HOST != '' || secrets.VPS_HOST != '' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Lay out artifacts in the layout the backend expects
        run: |
          mkdir -p deploy/dist
          mv dist/agent-linux   deploy/dist/linux
          mv dist/agent-windows deploy/dist/windows
          mv dist/agent-macos   deploy/dist/macos
          ls -la deploy/dist/*

      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_USER: ${{ secrets.VPS_SSH_USER || 'root' }}
        run: |
          scp -i ~/.ssh/id_rsa -r deploy/dist/* \
              "${VPS_SSH_USER}@${VPS_HOST}:/root/home/rmm/remoteconnect/agent/install/build/dist/"
          echo "✓ deployed to ${VPS_SSH_USER}@${VPS_HOST}"

  # ───────────────────────── Optional release ─────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
